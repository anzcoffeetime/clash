# 通用 Clash 配置文件，兼容 iOS Stash/ClashMeta、OpenWrt Nikki/OpenClash、安卓 ClashMeta
# 包含自动、手动、均衡-轮询、均衡-散列四种模式

proxy-providers:
  ssrdog:
    url: ""
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: Direct
    filter: '^(?!.*(群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author))'
  

  
proxies:
  - {name: Direct, type: direct}

port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
allow-lan: true
bind-address: "*"
mode: rule
log-level: warning
ipv6: false
unified-delay: true
tcp-concurrent: true
global-client-fingerprint: chrome
profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - "+.v2ex.com"
  skip-domain:
    - "+.baidu.com"

tun:
  enable: true
  stack: system
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-detect-interface: true


dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "+.market.xiaomi.com"
    - "time.*.com"
    - "+.msftncsi.com"
    - "+.msftconnecttest.com"
    - "+.lan"
    - "+.local"
    - "geosite:private"
    - "geosite:cn"

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 114.114.115.115
    - 180.76.76.76
    - 1.1.1.1
    - 8.8.8.8

  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 114.114.114.114
    - 180.76.76.76
    - 1.1.1.1
    - 8.8.8.8

  proxy-server-nameserver:
    - https://dns.cloudflare.com/dns-query
    - https://dns.google/dns-query
    - https://dns.quad9.net/dns-query
    - https://dns.adguard-dns.com/dns-query
    - https://dns.nextdns.io/dns-query
    - https://dns.opendns.com/dns-query

  nameserver-policy:
    "geosite:cn,private":
      - 223.5.5.5
      - 119.29.29.29
      - 114.114.115.115
      - 180.76.76.76
      - 182.254.116.116
      - 1.2.4.8

    "geosite:geolocation-!cn":
      - "https://dns.cloudflare.com/dns-query"
      - "https://dns.google/dns-query"
      - "https://dns.quad9.net/dns-query"
      - "https://dns.adguard-dns.com/dns-query"
      - "https://dns.nextdns.io/dns-query"
      - "https://dns.opendns.com/dns-query"

      
